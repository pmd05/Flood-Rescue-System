<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đài Điều Phối Cẩn Cấp</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary: #38bdf8;
      --primary-hover: #0284c7;
      --primary-glow: rgba(56, 189, 248, 0.4);
      --secondary: #6366f1;
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.3);
      --success: #10b981;
      --warning: #f59e0b;
      --bg-base: #030712;
      --surface-1: rgba(17, 24, 39, 0.7);
      --surface-2: rgba(31, 41, 55, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body,
    html {
      font-family: 'Plus Jakarta Sans', sans-serif !important;
      background-color: var(--bg-base) !important;
      color: var(--text-main) !important;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-mesh {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background-image:
        radial-gradient(circle at 80% 0%, rgba(56, 189, 248, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 20% 100%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
      filter: blur(60px);
      animation: ambientFlow 20s ease-in-out infinite alternate;
    }

    @keyframes ambientFlow {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.1) translate(20px, 20px);
      }
    }

    .shell {
      max-width: 1500px;
      margin: 0 auto;
      padding: 30px 24px 60px;
      animation: fadeInUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      position: relative;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(88, 28, 135, 0.4));
      border: 1px solid rgba(139, 92, 246, 0.3);
      padding: 40px 45px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 40px rgba(139, 92, 246, 0.1);
      margin-bottom: 40px;
      backdrop-filter: blur(16px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      overflow: hidden;
    }

    .hero-icon-bg {
      position: absolute;
      top: -50px;
      right: 5%;
      color: rgba(139, 92, 246, 0.08);
      transform: rotate(-15deg);
      pointer-events: none;
    }

    .hero-icon-bg svg {
      width: 350px;
      height: 350px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
    }

    .badge-premium {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: #c4b5fd;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 2.5rem;
      font-weight: 800;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    .hero p {
      margin: 0;
      color: #cbd5e1;
      font-size: 1.1rem;
      line-height: 1.7;
      font-weight: 400;
    }

    .logout-btn {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 14px 28px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 32px;
      align-items: start;
    }

    .bang-dieu-khien {
      background: var(--surface-1);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border-color);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      max-height: 85vh;
    }

    .bang-dieu-khien header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
    }

    .bang-dieu-khien h3 {
      margin: 0;
      font-size: 1.5rem;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .vung-cuon {
      overflow-y: auto;
      padding-right: 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .vung-cuon::-webkit-scrollbar {
      width: 6px;
    }

    .vung-cuon::-webkit-scrollbar-thumb {
      background: rgba(56, 189, 248, 0.2);
      border-radius: 10px;
    }

    .vung-cuon::-webkit-scrollbar-thumb:hover {
      background: rgba(56, 189, 248, 0.5);
    }

    .the-radar {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-left: 4px solid var(--primary);
      border-radius: 20px;
      padding: 22px;
      transition: all 0.3s ease;
      position: relative;
    }

    .the-radar:hover {
      transform: translateX(8px);
      background: rgba(15, 23, 42, 0.8);
      border-color: rgba(56, 189, 248, 0.3);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .the-radar.uu-tien-cao {
      border-left-color: var(--danger);
    }

    .the-radar.uu-tien-cao:hover {
      border-color: rgba(239, 68, 68, 0.3);
      box-shadow: 0 10px 25px var(--danger-glow);
    }

    .dong-tieu-de {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .dong-tieu-de strong {
      font-size: 1.2rem;
      color: #f8fafc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .thong-tin-phu {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 16px;
      display: grid;
      gap: 8px;
    }

    .thong-tin-phu .mieu-ta {
      color: #e2e8f0;
      font-weight: 500;
    }

    .hang-chip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip-cho {
      background: rgba(245, 158, 11, 0.1);
      color: #fcd34d;
      border-color: rgba(245, 158, 11, 0.25);
    }

    .chip-duyet {
      background: rgba(56, 189, 248, 0.1);
      color: #7dd3fc;
      border-color: rgba(56, 189, 248, 0.25);
    }

    .chip-xong {
      background: rgba(16, 185, 129, 0.15) !important;
      color: #10b981 !important;
      border-color: rgba(16, 185, 129, 0.3) !important;
    }

    .chip-bao-dong {
      background: rgba(239, 68, 68, 0.2) !important;
      color: #fca5a5 !important;
      border-color: rgba(239, 68, 68, 0.4) !important;
      animation: pulseRed 1.5s infinite;
    }

    @keyframes pulseRed {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .exception-blink {
      border: 1px solid #ef4444 !important;
      animation: pulseRed 1.5s infinite;
    }

    .req-card {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.25);
    }

    .chip-do {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.25);
    }

    .khu-vuc-nut {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .nut-hanh-dong {
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      transition: 0.3s;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .nut-duyet {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .nut-duyet:hover {
      background: rgba(16, 185, 129, 0.3);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .nut-chon {
      background: rgba(56, 189, 248, 0.15);
      color: #7dd3fc;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    .nut-chon:hover {
      background: rgba(56, 189, 248, 0.3);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
    }

    .form-phan-cong {
      background: rgba(0, 0, 0, 0.3);
      padding: 25px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
      transition: all 0.4s ease;
    }

    .form-phan-cong.dang-chon {
      border-color: var(--primary);
      box-shadow: 0 0 30px var(--primary-glow);
      transform: scale(1.02);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.95rem;
      color: #cbd5e1;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i.icon-prefix {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      pointer-events: none;
      transition: 0.3s;
    }

    .form-phan-cong input,
    .form-phan-cong select {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-color);
      color: #fff;
      border-radius: 14px;
      padding: 16px 16px 16px 48px;
      font-size: 1rem;
      font-family: inherit;
      transition: 0.3s;
      appearance: none;
    }

    .form-phan-cong input:focus,
    .form-phan-cong select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
      background: rgba(0, 0, 0, 0.6);
    }

    .form-phan-cong select option {
      background: #0f172a;
      padding: 10px;
    }

    .form-phan-cong select {
      appearance: auto;
    }

    .nut-xuat-kich {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
      border: none;
      padding: 18px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
    }

    .nut-xuat-kich:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(245, 158, 11, 0.5);
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
    }

    .nut-xuat-kich:disabled {
      background: #475569;
      color: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-icon-only {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      display: grid;
      place-items: center;
    }

    .btn-icon-only:hover {
      background: rgba(56, 189, 248, 0.15);
      color: var(--primary);
      border-color: rgba(56, 189, 248, 0.3);
    }

    .empty {
      text-align: center;
      color: #64748b;
      padding: 50px 20px;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .bang-dieu-khien {
        max-height: none;
      }
    }

    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
  <div class="bg-mesh"></div>

  <div class="shell">
    <section class="hero">
      <div class="hero-icon-bg"><i data-lucide="radio-receiver"></i></div>
      <div class="hero-content">
        <div class="badge-premium"><i data-lucide="crosshair" width="16" height="16"></i> Trạm Chỉ Huy</div>
        <h1>Đài Điều Phối Khẩn Cấp</h1>
        <p>Giám sát toàn bộ radar các yêu cầu cấu hộ SOS, xác minh thông tin và điều động chính xác các lực lượng tác
          chiến cùng khí tài hiện đại nhất đến hiện trường.</p>
      </div>
      <button class="logout-btn" onclick="logout()">
        <i data-lucide="log-out"></i> Đăng Xuất Hệ Thống
      </button>
    </section>

    <section class="bang-dieu-khien" style="margin-bottom: 30px; padding: 25px;">
      <header style="margin-bottom: 20px;">
        <h3 style="color: #a78bfa;"><i data-lucide="map"></i> Sa Bàn Chiến Sự (Radar Bản Đồ Số)</h3>
      </header>
      <div id="liveMap"
        style="height: 400px; border-radius: 20px; z-index: 1; border: 1px solid rgba(167, 139, 250, 0.3); box-shadow: inset 0 0 40px rgba(0,0,0,0.5);">
      </div>
    </section>

    <section class="grid">
      <!-- Cột Trái: Radar Yêu Cầu -->
      <div class="bang-dieu-khien">
        <header>
          <h3 style="color: #ef4444;"><i data-lucide="radar"></i> Radar Yêu Cầu Khẩn Cấp</h3>
          <button class="btn-icon-only" onclick="loadRequests()" title="Quét lại Radar">
            <i data-lucide="refresh-cw" width="20" height="20"></i>
          </button>
        </header>
        <div id="requestList" class="vung-cuon">
          <!-- Render from JS -->
        </div>
      </div>

      <!-- Cột Phải: Phân Công & Nhật Ký -->
      <div class="bang-dieu-khien">
        <header>
          <h3 style="color: #38bdf8;"><i data-lucide="send"></i> Lệnh Xuất Kích (Assign)</h3>
        </header>

        <form id="assignForm" class="form-phan-cong">
          <div class="form-group">
            <label><i data-lucide="target" width="18" height="18"></i> Mã Yêu Cầu (Chỉ định mục tiêu)</label>
            <div class="input-wrapper">
              <input id="requestId" type="number" placeholder="Bấm [Chọn Mục Tiêu Này] ở Radar bên trái..." required
                readonly style="background: rgba(0,0,0,0.6); cursor: not-allowed;" />
              <i data-lucide="hash" class="icon-prefix"></i>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label><i data-lucide="shield" width="18" height="18"></i> Đội Tác Chiến</label>
              <div class="input-wrapper">
                <select id="teamId"></select>
                <i data-lucide="users" class="icon-prefix"></i>
              </div>
            </div>
            <div class="form-group">
              <label><i data-lucide="truck" width="18" height="18"></i> Khí Tài Hỗ Trợ</label>
              <div class="input-wrapper">
                <select id="vehicleId"></select>
                <i data-lucide="pen-tool" class="icon-prefix"></i>
              </div>
            </div>
          </div>
          <button type="submit" id="submitBtn" class="nut-xuat-kich">
            <i data-lucide="flame"></i> Phát Lệnh Lên Đường
          </button>
        </form>

        <header style="margin-top: 10px;">
          <h3><i data-lucide="clipboard-list"></i> Nhật Ký Điều Động</h3>
          <button class="btn-icon-only" onclick="loadAssignments()" title="Làm mới Nhật ký">
            <i data-lucide="rotate-cw" width="20" height="20"></i>
          </button>
        </header>
        <div id="assignmentList" class="vung-cuon">
          <!-- Render from JS -->
        </div>
      </div>
    </section>
  </div>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script>
    lucide.createIcons();
    requireRole(['coordinator']);

    // Khởi tạo bản đồ
    let map = L.map('liveMap').setView([16.047079, 108.206230], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    let mapMarkers = [];

    const transStatus = {
      pending: { text: 'Chờ xác minh', cls: 'chip-cho', icon: 'hourglass' },
      verified: { text: 'Đã duyệt', cls: 'chip-duyet', icon: 'check-circle' },
      assigned: { text: 'Đang điều quân', cls: 'chip-xong', icon: 'truck' },
      completed: { text: 'Hoàn tất', cls: 'chip-xong', icon: 'shield-check' },
      blocked: { text: 'Gặp sự cố', cls: 'chip-bao-dong', icon: 'barrier-block' },
      need_backup: { text: 'Xin chi viện', cls: 'chip-bao-dong', icon: 'life-buoy' },
      revoked: { text: 'Lệnh đã hủy', cls: 'chip-cho', icon: 'x-octagon' }
    };

    const transPriority = {
      low: { text: 'Ưu tiên thấp', cls: 'chip-cho', icon: 'arrow-down' },
      medium: { text: 'Trung bình', cls: 'chip-cho', icon: 'alert-circle' },
      high: { text: 'KHẨN CẤP', cls: 'chip-do', icon: 'flame' }
    };

    async function loadLookups() {
      try {
        const res = await apiFetch('/lookups');
        const allTeams = res.data.allTeams || [];
        const availableTeams = res.data.teams || [];
        const vehicles = (res.data.vehicles || []).filter(v => v.status === 'available');

        document.getElementById('teamId').innerHTML = allTeams.length
          ? allTeams.map(t => {
              const isFree = availableTeams.some(av => av.id === t.id);
              return isFree 
                ? `<option value="${t.id}">${t.name}</option>` 
                : `<option value="${t.id}" disabled>${t.name} (Đang bận nhiệm vụ)</option>`;
            }).join('')
          : '<option value="">Cảnh báo: Chưa cài đặt đội cứu hộ (Liên hệ Admin)</option>';

        document.getElementById('vehicleId').innerHTML = vehicles.length
          ? vehicles.map(v => `<option value="${v.id}">${v.name}</option>`).join('')
          : '<option value="">Cảnh báo: Kho hết xe</option>';
      } catch (error) {
        alert('Lỗi lấy thông tin quân số: ' + error.message);
      }
    }

    let allAssignmentsCross = [];

    async function loadRequests() {
      const box = document.getElementById('requestList');
      try {
        // Lấy chéo danh sách assignments để ghép dữ liệu ngoại cảnh
        try {
          const assRes = await apiFetch('/assignments');
          if (assRes && assRes.data) allAssignmentsCross = assRes.data;
        } catch (e) { }

        const res = await apiFetch('/requests');
        const ds = res.data || [];

        mapMarkers.forEach(m => map.removeLayer(m));
        mapMarkers = [];

        if (!ds.length) {
          box.innerHTML = `<div class="empty"><i data-lucide="shield-check" width="48" height="48"></i><span>Radar trống rỗng! Thế giới tạm thời bình yên.</span></div>`;
          lucide.createIcons();
          return;
        }

        ds.forEach(r => {
          if (r.latitude && r.longitude && (r.status === 'pending' || r.status === 'verified' || r.status === 'blocked' || r.status === 'need_backup')) {
            let isException = (r.status === 'blocked' || r.status === 'need_backup');
            let color = isException ? '#ef4444' : (r.priority === 'high' ? '#ef4444' : (r.priority === 'medium' ? '#f59e0b' : '#3b82f6'));
            let m = L.circleMarker([r.latitude, r.longitude], {
              radius: r.priority === 'high' ? 12 : 8,
              fillColor: color,
              color: '#ffffff',
              weight: 2,
              opacity: 1,
              fillOpacity: 0.8
            }).addTo(map);
            let linkedAss = isException ? allAssignmentsCross.find(a => a.request.id === r.id && (a.status === 'blocked' || a.status === 'need_backup')) : null;
            let noteHtml = linkedAss && linkedAss.exceptionNote ? `<p style="color:#ef4444; font-weight:bold; margin: 5px 0;">[Sự cố]: ${linkedAss.exceptionNote}</p>` : '';
            let imgHtml = linkedAss && linkedAss.exceptionImage ? `<img src="${linkedAss.exceptionImage}" style="width:100%; max-height:100px; object-fit:cover; border-radius:6px; margin-bottom:5px; border:1px solid #ef4444;" />` : '';

            m.bindPopup(`
              <div style="color: #333; font-family: 'Plus Jakarta Sans', sans-serif; min-width: 200px;">
                <b>📍 Yêu cầu #${r.id}</b>
                <p style="margin: 5px 0;">${r.description || ''}</p>
                ${noteHtml}
                ${imgHtml}
                <button onclick="fillAssign(${r.id})" style="background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold;">Chỉ Định Mục Tiêu</button>
              </div>
            `);
            mapMarkers.push(m);

            // Pulse animation for high priority or exception
            if (r.priority === 'high' || isException) {
              L.circleMarker([r.latitude, r.longitude], {
                radius: 20, color: '#ef4444', weight: 1, opacity: 0.5, currentRadius: 10
              }).addTo(map);
            }
          }
        });

        box.innerHTML = ds.map((r) => {
          const st = transStatus[r.status] || { text: r.status, cls: 'chip-cho', icon: 'help-circle' };
          const pr = transPriority[r.priority] || { text: r.priority, cls: 'chip-cho', icon: 'info' };
          const isHighPriority = r.priority === 'high' ? 'uu-tien-cao' : '';

          const btnVerify = r.status === 'pending'
            ? `<button class="nut-hanh-dong nut-duyet" onclick="verifyRequest(${r.id})"><i data-lucide="check-square" width="18" height="18"></i> Duyệt Yêu Cầu</button>`
            : '';

          const btnAssign = r.status === 'verified'
            ? `<button class="nut-hanh-dong nut-chon" onclick="fillAssign(${r.id})"><i data-lucide="crosshair" width="18" height="18"></i> Chọn Mục Tiêu Này</button>`
            : '';

          let isException = (r.status === 'blocked' || r.status === 'need_backup');
          let linkedAss = isException ? allAssignmentsCross.find(a => a.request.id === r.id && (a.status === 'blocked' || a.status === 'need_backup')) : null;
          let extraHtml = '';
          if (linkedAss) {
            extraHtml = `
              <div style="margin-top: 10px; padding: 10px; background: rgba(239, 68, 68, 0.15); border-radius: 8px; border: 1px dashed rgba(239, 68, 68, 0.4);">
                <strong style="color: #fca5a5; display:block; margin-bottom:5px;"><i data-lucide="alert-triangle" width="14" height="14"></i> Chi Tiết Sự Cố:</strong>
                <p style="color: #f87171; font-size: 0.9rem; margin:0 0 8px 0;">${linkedAss.exceptionNote || ''}</p>
                ${linkedAss.exceptionImage ? `<img src="${linkedAss.exceptionImage}" style="max-width: 100%; border-radius: 6px; max-height: 120px; object-fit: cover;" />` : ''}
              </div>
            `;
          }

          return `
            <div class="the-radar ${isHighPriority} ${isException ? 'exception-blink' : ''}">
              <div class="dong-tieu-de">
                <strong><i data-lucide="radio-receiver" width="20" height="20"></i> Yêu cầu #${r.id}</strong>
                <div class="hang-chip">
                  <span class="chip ${pr.cls}"><i data-lucide="${pr.icon}" width="14" height="14"></i> ${pr.text}</span>
                  <span class="chip ${st.cls}"><i data-lucide="${st.icon}" width="14" height="14"></i> ${st.text}</span>
                </div>
              </div>
              <div class="thong-tin-phu">
                <div class="mieu-ta"><i data-lucide="message-square" width="16" height="16" style="vertical-align:middle; margin-right:6px"></i>${r.description}</div>
                <div><i data-lucide="user" width="14" height="14" style="vertical-align:middle; margin-right:6px"></i>Người báo: ${r.user?.username || 'Ẩn danh'}</div>
              </div>
              ${extraHtml}
              ${(btnVerify || btnAssign) ? `
              <div class="khu-vuc-nut">
                ${btnVerify}
                ${btnAssign}
              </div>` : ''}
            </div>
          `;
        }).join('');
        lucide.createIcons();
      } catch (error) {
        box.innerHTML = `<div class="empty" style="color:#fca5a5"><i data-lucide="wifi-off" width="48" height="48"></i><span>Lỗi radar: ${error.message}</span></div>`;
        lucide.createIcons();
      }
    }

    async function loadAssignments() {
      const box = document.getElementById('assignmentList');
      try {
        const res = await apiFetch('/assignments');
        const ds = res.data || [];
        if (!ds.length) {
          box.innerHTML = `<div class="empty" style="padding: 30px;"><i data-lucide="clipboard" width="32" height="32"></i><span>Chưa có lệnh điều động nào.</span></div>`;
          lucide.createIcons();
          return;
        }

        box.innerHTML = ds.map((a) => {
          const st = transStatus[a.status] || { text: a.status, cls: 'chip-cho', icon: 'help-circle' };
          const isException = (a.status === 'blocked' || a.status === 'need_backup');
          const borderStyle = isException ? 'border: 2px solid #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);' : '';

          const exceptionUI = isException ? `
            <div style="margin-top: 15px; padding: 15px; background: rgba(239, 68, 68, 0.1); border-radius: 12px; border: 1px dashed rgba(239, 68, 68, 0.3);">
              <strong style="color: #fca5a5; display: flex; align-items: center; gap: 6px; margin-bottom: 8px;"><i data-lucide="alert-triangle" width="16" height="16"></i> Báo Cáo Sự Cố:</strong>
              <div style="color: #f87171; font-size: 0.95rem; margin-bottom: 10px;">${a.exceptionNote || 'Không có ghi chú'}</div>
              ${a.exceptionImage ? `<img src="${a.exceptionImage}" style="max-width: 100%; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.3); object-fit: cover;" />` : ''}
              <button onclick="revokeTask(${a.id})" style="width: 100%; padding: 10px; border-radius: 8px; border: none; background: #ef4444; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; transition: 0.2s;"><i data-lucide="shield-off" width="16" height="16"></i> Hủy Lệnh & Rút Quân Mở Đường</button>
            </div>
          ` : '';

          return `
          <div class="the-radar" style="padding: 20px; ${borderStyle}">
            <div class="dong-tieu-de" style="margin-bottom: 10px;">
              <strong style="font-size: 1.1rem;"><i data-lucide="file-text" width="18" height="18"></i> Lệnh Cứu Hộ #${a.id}</strong>
              <span class="chip ${st.cls}"><i data-lucide="${st.icon}" width="14" height="14"></i> ${st.text}</span>
            </div>
            <div class="thong-tin-phu" style="gap: 6px;">
              <div><strong style="color:#e2e8f0;">📍 Mục tiêu:</strong> Cứu hộ điểm #${a.request?.id || 'N/A'}</div>
              <div><strong style="color:#e2e8f0;">🛡️ Đội xử lý:</strong> ${a.team?.name || 'N/A'}</div>
              <div><strong style="color:#e2e8f0;">🚁 Khí tài:</strong> ${a.vehicle?.name || 'N/A'}</div>
              <div><strong style="color:#e2e8f0;">🕒 Giờ G:</strong> ${a.assignedAt ? new Date(a.assignedAt).toLocaleString('vi-VN') : 'N/A'}</div>
            </div>
            ${exceptionUI}
          </div>
        `}).join('');
        lucide.createIcons();
      } catch (error) {
        box.innerHTML = `<div class="empty" style="color:#fca5a5"><i data-lucide="alert-triangle" width="32" height="32"></i><span>Lỗi nhật ký: ${error.message}</span></div>`;
        lucide.createIcons();
      }
    }

    window.revokeTask = async function(id) {
       if (!confirm("🚨 Cảnh báo: Thu hồi lệnh này đồng nghĩa với việc lực lượng sẽ rút lui, xe cộ trả về kho và vị trí Khẩn Cấp này sẽ hiện lại trên bản đồ. Bạn có chắc chắn?")) return;
       try {
         await apiFetch('/assignments/' + id + '/revoke', { method: 'PATCH' });
         alert("✅ Thu hồi lệnh THÀNH CÔNG! Đội cứu hộ đã được giải phóng!");
         await loadAssignments();
         await loadRequests();
         await loadLookups();
       } catch (error) {
         alert("❌ Lỗi hủy lệnh: " + error.message);
       }
    }

    window.fillAssign = function (id) {
      const form = document.getElementById('assignForm');
      document.getElementById('requestId').value = id;

      form.classList.add('dang-chon');
      setTimeout(() => form.classList.remove('dang-chon'), 1000);
      form.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    window.verifyRequest = async function (id) {
      if (!confirm('Xác nhận thông tin báo cáo này là chính xác và không lừa đảo?')) return;
      try {
        await apiFetch('/requests/' + id + '/verify', { method: 'PATCH' });
        alert('✅ Đã đóng dấu xác minh! Sẵn sàng điều quân xử lý.');
        await loadRequests();
      } catch (error) {
        alert('❌ Lỗi: ' + error.message);
      }
    }

    document.getElementById('assignForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const reqId = document.getElementById('requestId').value;
      const tId = document.getElementById('teamId').value;
      const vId = document.getElementById('vehicleId').value;

      if (!reqId) return alert('Hệ thống: Xin vui lòng chọn mục tiêu từ Radar bên trái trước!');
      if (!tId || !vId) return alert('Hệ thống cảnh báo: Khoan đã! Phải chọn đủ lực lượng và phương tiện mới được cho xuất kích!');

      const btn = document.getElementById('submitBtn');
      try {
        btn.disabled = true;
        btn.innerHTML = '<i data-lucide="loader-2" class="lucide-spin"></i> Đang truyền lệnh mã hóa...';
        lucide.createIcons();

        await apiFetch('/assignments', {
          method: 'POST',
          body: JSON.stringify({
            requestId: Number(reqId),
            teamId: Number(tId),
            vehicleId: Number(vId)
          }),
          headers: { 'Content-Type': 'application/json' }
        });

        alert('🚀 Lệnh xuất kích đã được phê duyệt và truyền đi thành công!');
        e.target.reset();
        await loadLookups();
        await loadRequests();
        await loadAssignments();
      } catch (error) {
        alert('❌ Lệnh bị gián đoạn: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="flame"></i> Phát Lệnh Lên Đường';
        lucide.createIcons();
      }
    });

    loadLookups();
    loadRequests();
    loadAssignments();

  </script>
</body>

</html>
